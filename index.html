<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로또 추첨기</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KCTZVHPNBR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-KCTZVHPNBR");
    </script>
    <style>
      :root {
        --bg-a: #fff7ed;
        --bg-b: #eff6ff;
        --bg-c: #fdf2f8;
        --card: rgba(255, 255, 255, 0.78);
        --card-border: rgba(255, 255, 255, 0.7);
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #f59e0b;
        --accent-2: #10b981;
        --accent-3: #3b82f6;
        --shadow: 0 24px 70px rgba(59, 130, 246, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(245, 158, 11, 0.25), transparent 32%),
          radial-gradient(circle at top right, rgba(59, 130, 246, 0.18), transparent 30%),
          radial-gradient(circle at 20% 80%, rgba(16, 185, 129, 0.18), transparent 24%),
          linear-gradient(135deg, var(--bg-a), var(--bg-b) 55%, var(--bg-c));
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto;
        border-radius: 999px;
        pointer-events: none;
        filter: blur(10px);
        opacity: 0.75;
        animation: float 12s ease-in-out infinite;
      }

      body::before {
        width: 220px;
        height: 220px;
        right: -40px;
        top: 70px;
        background: rgba(251, 191, 36, 0.18);
      }

      body::after {
        width: 280px;
        height: 280px;
        left: -80px;
        bottom: -60px;
        background: rgba(59, 130, 246, 0.14);
        animation-delay: -4s;
      }

      .app {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(920px, 100%);
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 30px;
        padding: 36px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        overflow: hidden;
        position: relative;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.55), transparent 40%),
          linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.08));
        pointer-events: none;
      }

      .hero {
        position: relative;
        display: grid;
        gap: 12px;
        margin-bottom: 26px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.8);
        color: var(--accent-3);
        font-weight: 700;
        letter-spacing: 0.02em;
        box-shadow: 0 8px 24px rgba(59, 130, 246, 0.08);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 5vw, 4rem);
        line-height: 1.05;
      }

      .lead {
        margin: 0;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.7;
        max-width: 48rem;
      }

      .toolbar {
        position: relative;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 28px 0 26px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 14px 22px;
        font-size: 1rem;
        font-weight: 800;
        cursor: pointer;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          opacity 0.18s ease,
          filter 0.18s ease;
      }

      button:hover {
        transform: translateY(-2px);
        filter: saturate(1.05);
      }

      button:active {
        transform: translateY(1px) scale(0.99);
      }

      .primary {
        background: linear-gradient(135deg, #fbbf24, #fb7185);
        color: #fff;
        box-shadow: 0 16px 28px rgba(251, 113, 133, 0.28);
      }

      .secondary {
        background: rgba(255, 255, 255, 0.82);
        color: var(--text);
        border: 1px solid rgba(148, 163, 184, 0.18);
      }

      .primary:focus-visible,
      .secondary:focus-visible {
        outline: 4px solid rgba(59, 130, 246, 0.22);
        outline-offset: 3px;
      }

      .result {
        position: relative;
        display: grid;
        gap: 22px;
      }

      .panel {
        padding: 20px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.7);
      }

      .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 0.95rem;
        font-weight: 600;
      }

      .glow {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent), var(--accent-3));
        box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.35);
        animation: pulse 1.8s infinite;
      }

      .balls {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        min-height: 84px;
      }

      .ball {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-weight: 900;
        color: #111827;
        background: radial-gradient(circle at 30% 30%, #fffbe6, #fcd34d 62%, #f59e0b);
        box-shadow:
          inset 0 -7px 12px rgba(0, 0, 0, 0.12),
          0 10px 22px rgba(245, 158, 11, 0.2);
        animation: ballIn 0.75s cubic-bezier(0.2, 0.9, 0.2, 1.2) both;
        position: relative;
        isolation: isolate;
      }

      .ball::after {
        content: "";
        position: absolute;
        inset: 10px 14px auto auto;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.7);
        filter: blur(1px);
      }

      .ball.bonus {
        background: radial-gradient(circle at 30% 30%, #ecfdf5, #34d399 62%, #059669);
      }

      .ball.bonus::after {
        background: rgba(255, 255, 255, 0.62);
      }

      .history {
        display: grid;
        gap: 10px;
      }

      .history-item {
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.75);
        color: var(--text);
      }

      .confetti {
        position: fixed;
        top: 0;
        width: 10px;
        height: 18px;
        border-radius: 999px;
        pointer-events: none;
        animation: confettiFall 1100ms ease-out forwards;
        z-index: 999;
      }

      .shake {
        animation: shake 420ms ease-in-out;
      }

      .spark {
        position: fixed;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        pointer-events: none;
        background: rgba(255, 255, 255, 0.8);
        box-shadow:
          0 0 0 8px rgba(255, 255, 255, 0.12),
          0 0 18px rgba(255, 255, 255, 0.65);
        animation: sparkBurst 700ms ease-out forwards;
        z-index: 998;
      }

      @keyframes ballIn {
        0% {
          transform: translateY(18px) scale(0.3) rotate(-18deg);
          opacity: 0;
          filter: blur(3px);
        }
        60% {
          transform: translateY(-6px) scale(1.08) rotate(8deg);
          opacity: 1;
          filter: blur(0);
        }
        100% {
          transform: translateY(0) scale(1) rotate(0);
          opacity: 1;
        }
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.35);
        }
        70% {
          box-shadow: 0 0 0 12px rgba(251, 191, 36, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(251, 191, 36, 0);
        }
      }

      @keyframes confettiFall {
        0% {
          transform: translate3d(0, -20px, 0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translate3d(var(--drift), 92vh, 0) rotate(720deg);
          opacity: 0;
        }
      }

      @keyframes sparkBurst {
        0% {
          transform: scale(0.4);
          opacity: 0.95;
        }
        100% {
          transform: scale(4);
          opacity: 0;
        }
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-4px);
        }
        40% {
          transform: translateX(5px);
        }
        60% {
          transform: translateX(-3px);
        }
        80% {
          transform: translateX(2px);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-14px) scale(1.04);
        }
      }

      @media (max-width: 640px) {
        .card {
          padding: 24px;
          border-radius: 24px;
        }

        .ball {
          width: 52px;
          height: 52px;
          font-size: 0.95rem;
        }

        .panel {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="card" aria-labelledby="title">
        <div class="hero">
          <div class="badge">Bright Lottery Studio</div>
          <h1 id="title">로또 추첨기</h1>
          <p class="lead">
            버튼을 누르면 1부터 45까지의 숫자 중에서 중복 없이 6개와 보너스 번호 1개를 뽑습니다.
            추첨 순간에는 반짝이는 연출과 축포 효과로 더 화려하게 보여줍니다.
          </p>
        </div>

        <div class="toolbar">
          <button class="primary" id="drawBtn">추첨하기</button>
          <button class="secondary" id="clearBtn">초기화</button>
        </div>

        <div class="result" aria-live="polite">
          <div class="panel">
            <div class="meta">
              <span>당첨 번호</span>
              <span class="glow"></span>
            </div>
            <div class="balls" id="mainBalls"></div>
          </div>

          <div class="panel">
            <div class="meta">
              <span>보너스 번호</span>
              <span class="glow"></span>
            </div>
            <div class="balls" id="bonusBall"></div>
          </div>

          <div class="panel">
            <div class="meta">
              <span>최근 기록</span>
              <span class="glow"></span>
            </div>
            <div class="history" id="history"></div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const drawBtn = document.getElementById("drawBtn");
      const clearBtn = document.getElementById("clearBtn");
      const mainBalls = document.getElementById("mainBalls");
      const bonusBall = document.getElementById("bonusBall");
      const history = document.getElementById("history");
      const card = document.querySelector(".card");
      const MAX_HISTORY = 5;

      const pickNumbers = () => {
        const pool = Array.from({ length: 45 }, (_, i) => i + 1);
        const picks = [];

        while (picks.length < 7) {
          const index = Math.floor(Math.random() * pool.length);
          picks.push(pool.splice(index, 1)[0]);
        }

        return {
          main: picks.slice(0, 6).sort((a, b) => a - b),
          bonus: picks[6],
        };
      };

      const renderBalls = (container, numbers, isBonus = false) => {
        container.innerHTML = "";
        numbers.forEach((number, idx) => {
          const ball = document.createElement("div");
          ball.className = `ball${isBonus ? " bonus" : ""}`;
          ball.textContent = number;
          ball.style.animationDelay = `${idx * 120}ms`;
          container.appendChild(ball);
        });
      };

      const formatHistoryText = (main, bonus, createdAt) => {
        const date = new Date(createdAt);
        const stamp = date.toLocaleString("ko-KR", {
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        });
        return `${main.join(", ")} + 보너스 ${bonus} · ${stamp}`;
      };

      const renderHistory = (entries) => {
        history.innerHTML = "";
        entries.forEach((entry) => {
          const item = document.createElement("div");
          item.className = "history-item";
          item.textContent = formatHistoryText(entry.main, entry.bonus, entry.createdAt);
          history.appendChild(item);
        });
      };

      const loadHistory = async () => {
        try {
          const response = await fetch("/api/draws");
          if (!response.ok) {
            throw new Error(`Failed to load draws: ${response.status}`);
          }
          const entries = await response.json();
          renderHistory(entries);
        } catch (error) {
          console.error("Failed to load lotto history", error);
        }
      };

      const saveHistory = async (main, bonus) => {
        const response = await fetch("/api/draws", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ main, bonus }),
        });

        if (!response.ok) {
          throw new Error(`Failed to save draw: ${response.status}`);
        }

        const entries = await response.json();
        renderHistory(entries);
      };

      const clearHistoryDb = async () => {
        const response = await fetch("/api/draws", {
          method: "DELETE",
        });

        if (!response.ok) {
          throw new Error(`Failed to clear draws: ${response.status}`);
        }

        history.innerHTML = "";
      };

      const createConfetti = () => {
        const colors = ["#f59e0b", "#fb7185", "#3b82f6", "#10b981", "#8b5cf6"];
        const pieces = 24;

        for (let i = 0; i < pieces; i += 1) {
          const confetti = document.createElement("div");
          confetti.className = "confetti";
          confetti.style.left = `${Math.random() * 100}vw`;
          confetti.style.background = colors[i % colors.length];
          confetti.style.setProperty("--drift", `${(Math.random() * 2 - 1) * 140}px`);
          confetti.style.animationDelay = `${Math.random() * 120}ms`;
          confetti.style.width = `${8 + Math.random() * 8}px`;
          confetti.style.height = `${14 + Math.random() * 10}px`;
          document.body.appendChild(confetti);
          setTimeout(() => confetti.remove(), 1300);
        }
      };

      const createSparkBurst = () => {
        const rect = drawBtn.getBoundingClientRect();
        const count = 10;
        for (let i = 0; i < count; i += 1) {
          const spark = document.createElement("div");
          spark.className = "spark";
          spark.style.left = `${rect.left + rect.width / 2 - 7}px`;
          spark.style.top = `${rect.top + rect.height / 2 - 7}px`;
          spark.style.transform = `translate(${(Math.random() * 2 - 1) * 60}px, ${(Math.random() * 2 - 1) * 60}px)`;
          spark.style.animationDelay = `${i * 24}ms`;
          document.body.appendChild(spark);
          setTimeout(() => spark.remove(), 800);
        }
      };

      const drawLottery = () => {
        const { main, bonus } = pickNumbers();
        card.classList.remove("shake");
        void card.offsetWidth;
        card.classList.add("shake");

        renderBalls(mainBalls, main);
        renderBalls(bonusBall, [bonus], true);
        createConfetti();
        createSparkBurst();
        saveHistory(main, bonus).catch((error) => {
          console.error("Failed to save lotto draw", error);
        });
      };

      drawBtn.addEventListener("click", drawLottery);

      clearBtn.addEventListener("click", () => {
        mainBalls.innerHTML = "";
        bonusBall.innerHTML = "";
        clearHistoryDb().catch((error) => {
          console.error("Failed to clear lotto history", error);
          history.innerHTML = "";
        });
      });

      loadHistory();
    </script>
  </body>
</html>
